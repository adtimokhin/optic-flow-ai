ingestion:
  source: "webcam"  # "webcam" or "youtube"
  path: ""          # YouTube URL when source is "youtube"
  webcam:
    device_index: 0
    frame_width: 1280
    frame_height: 720
    frame_rate: 30
  youtube:
    format: "best[ext=mp4]/best"
    frame_rate: 30

detection:
  waterline:
    model_path: "models/waterline/"
    confidence_threshold: 0.7
  plimsoll:
    model_path: "models/plimsoll/"
    confidence_threshold: 0.7

ais:
  provider: "aisstream"  # "aisstream" or "marinetraffic"
  # API key loaded from .env

output:
  format: "json"
  destination: "stdout"  # "stdout" or path to log file
